
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tota's Shop</title>
  <style>
    body {
      background-color: #ffe5d9; /* pastel peach */
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 20px;
      font-size: 2em;
      color: #d45d79;
    }
    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 40px;
    }
    .product {
      background: white;
      border-radius: 10px;
      padding: 20px;
      width: 200px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .product img {
      max-width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>Welcome to Tota's Shop</header>
  <div class="products">
    <div class="product">
      <img src="images/product1.png" alt="Lip Gloss">
      <p>Fan-shaped Lip Gloss</p>
    </div>
    <div class="product">
      <img src="images/product2.png" alt="Hand Cream">
      <p>Sakura Hand Cream</p>
    </div>
    <div class="product">
      <img src="images/product3.png" alt="Colorful Socks">
      <p>Playful Socks Set</p>
    </div>
  </div>
</body>
</html>
